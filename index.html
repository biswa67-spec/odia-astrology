<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ଓଡ଼ିଆ ଜ୍ୟୋତିଷ ଗଣନା</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#1a237e">

</head>

<body>

<div class="container">

<header>
<h1>🔯 ଓଡ଼ିଆ ଜ୍ୟୋତିଷ ଗଣନା</h1>
<p>ରାଶି • ନକ୍ଷତ୍ର • ଲଗ୍ନ • ମହାଦଶା • ଅନ୍ତରଦଶା</p>
</header>

<section class="form-box">

<label>ନାମ</label>
<input type="text" id="name" placeholder="ନାମ ଲେଖନ୍ତୁ">

<label>ଜନ୍ମ ତାରିଖ</label>
<input type="date" id="dob">

<label>ଜନ୍ମ ସମୟ</label>
<input type="time" id="tob">

<label>ଜନ୍ମ ସ୍ଥାନ</label>
<input type="text" id="place" placeholder="ଭୁବନେଶ୍ୱର">

<button onclick="calculateAstro()">
ଗଣନା କରନ୍ତୁ
</button>

</section>

<section id="resultCard" class="result-card">

<div class="row">
<span>ନାମ</span>
<b id="r_name">-</b>
</div>

<div class="row">
<span>ରାଶି</span>
<b id="r_rashi">-</b>
</div>

<div class="row">
<span>ନକ୍ଷତ୍ର</span>
<b id="r_nak">-</b>
</div>

<div class="row">
<span>ଲଗ୍ନ</span>
<b id="r_lagna">-</b>
</div>

<div class="row">
<span>ମହାଦଶା</span>
<b id="r_maha">-</b>
</div>

<div class="row">
<span>ଅନ୍ତରଦଶା</span>
<b id="r_antara">-</b>
</div>

</section>

<section class="buttons">

<button onclick="saveData()">
💾 ସେଭ୍
</button>

<button onclick="printResult()">
🖨️ ପ୍ରିଣ୍ଟ
</button>

<button onclick="downloadPDF()">
📄 PDF
</button>

</section>

<section class="history">

<h2>ସଂରକ୍ଷିତ ତଥ୍ୟ</h2>

<div id="historyList"></div>

</section>
<button onclick="clearAllRecords()">
🗑️ ସମସ୍ତ ଡିଲିଟ୍
</button>
<button onclick="shareWhatsApp()">
📱 WhatsApp
</button>

<button onclick="exportBackup()">
⬇️ Backup
</button>

<input
type="file"
accept=".json"
onchange="importBackup(event)">
<footer>
Developed By Biswajit Nayak
</footer>

</div>


<script>
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}
</script>
<script src="script.js"></script>
</body>
</html>
